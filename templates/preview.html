<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Share Preview</title>
    <style>
      :root {
        color-scheme: light dark;
        --bg: #f4f5f7;
        --panel: #ffffff;
        --text: #111827;
        --muted: #6b7280;
        --border: #e5e7eb;
        --accent: #2563eb;
        --shadow: 0 10px 30px rgba(17, 24, 39, 0.08);
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #0f1115;
          --panel: #171a21;
          --text: #f3f4f6;
          --muted: #9ca3af;
          --border: #2a3140;
          --accent: #60a5fa;
          --shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
        }
      }

      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, sans-serif;
        background: var(--bg);
        color: var(--text);
        line-height: 1.5;
      }

      .wrap {
        max-width: 1100px;
        margin: 0 auto;
        padding: 32px 20px 48px;
      }

      header {
        margin-bottom: 28px;
      }

      header h1 {
        margin: 0 0 8px;
        font-size: 1.5rem;
      }

      header p {
        margin: 0;
        color: var(--muted);
        font-size: 0.95rem;
        word-break: break-all;
      }

      .tabs {
        display: flex;
        gap: 8px;
        margin-bottom: 20px;
        flex-wrap: wrap;
      }

      .tab {
        border: 1px solid var(--border);
        background: var(--panel);
        color: var(--text);
        padding: 8px 14px;
        border-radius: 999px;
        cursor: pointer;
        font-size: 0.9rem;
      }

      .tab.active {
        border-color: var(--accent);
        color: var(--accent);
        font-weight: 600;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
        gap: 20px;
      }

      .card-shell {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 16px;
        box-shadow: var(--shadow);
        overflow: hidden;
      }

      .card-shell h2 {
        margin: 0;
        padding: 14px 16px;
        font-size: 0.85rem;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        color: var(--muted);
        border-bottom: 1px solid var(--border);
      }

      .mock {
        padding: 18px;
      }

      .mock.hidden { display: none; }

      .x-card, .li-card, .slack-card {
        border: 1px solid var(--border);
        border-radius: 14px;
        overflow: hidden;
        background: var(--panel);
      }

      .x-card img, .li-card img, .slack-card img {
        display: block;
        width: 100%;
        aspect-ratio: 1.91 / 1;
        object-fit: cover;
        background: #d1d5db;
      }

      .x-body, .li-body, .slack-body {
        padding: 12px 14px 14px;
      }

      .domain {
        color: var(--muted);
        font-size: 0.8rem;
        margin-bottom: 4px;
      }

      .title {
        font-weight: 700;
        font-size: 1rem;
        margin-bottom: 4px;
      }

      .desc {
        color: var(--muted);
        font-size: 0.9rem;
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
      }

      .slack-card {
        display: grid;
        grid-template-columns: 96px 1fr;
      }

      .slack-card img {
        width: 96px;
        height: 96px;
        aspect-ratio: auto;
      }

      .meta-panel {
        margin-top: 24px;
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 16px 18px;
      }

      .meta-panel h3 {
        margin: 0 0 10px;
        font-size: 0.95rem;
      }

      .warnings {
        margin: 0 0 12px;
        padding-left: 18px;
        color: #b45309;
      }

      pre {
        margin: 0;
        padding: 14px;
        background: #0b1020;
        color: #e5e7eb;
        border-radius: 12px;
        overflow: auto;
        font-size: 0.78rem;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <header>
        <h1>Share Preview</h1>
        <p id="source">Source: <!--SOURCE_URL--></p>
      </header>

      <div class="tabs" id="tabs">
        <button class="tab active" data-platform="all">All</button>
        <button class="tab" data-platform="twitter">X / Twitter</button>
        <button class="tab" data-platform="linkedin">LinkedIn</button>
        <button class="tab" data-platform="slack">Slack</button>
      </div>

      <div class="grid" id="grid">
        <section class="card-shell mock" data-platform="twitter">
          <h2>X / Twitter</h2>
          <div class="mock">
            <div class="x-card">
              <img id="tw-image" alt="" />
              <div class="x-body">
                <div class="domain" id="tw-domain"></div>
                <div class="title" id="tw-title"></div>
                <div class="desc" id="tw-desc"></div>
              </div>
            </div>
          </div>
        </section>

        <section class="card-shell mock" data-platform="linkedin">
          <h2>LinkedIn</h2>
          <div class="mock">
            <div class="li-card">
              <img id="li-image" alt="" />
              <div class="li-body">
                <div class="domain" id="li-domain"></div>
                <div class="title" id="li-title"></div>
                <div class="desc" id="li-desc"></div>
              </div>
            </div>
          </div>
        </section>

        <section class="card-shell mock" data-platform="slack">
          <h2>Slack</h2>
          <div class="mock">
            <div class="slack-card">
              <img id="sl-image" alt="" />
              <div class="slack-body">
                <div class="domain" id="sl-domain"></div>
                <div class="title" id="sl-title"></div>
                <div class="desc" id="sl-desc"></div>
              </div>
            </div>
          </div>
        </section>
      </div>

      <section class="meta-panel">
        <h3>Extracted meta</h3>
        <ul class="warnings" id="warnings"></ul>
        <pre id="json"></pre>
      </section>
    </div>

    <script id="payload" type="application/json"><!--PAYLOAD_JSON--></script>
    <script>
      const data = JSON.parse(document.getElementById('payload').textContent);
      const domain = (() => {
        try { return new URL(data.og.url).hostname.replace(/^www\./, ''); }
        catch { return 'example.com'; }
      })();

      const image = data.og.image ? `/proxy?url=${encodeURIComponent(data.og.image)}` : '';

      function fill(prefix, title, desc) {
        const img = document.getElementById(`${prefix}-image`);
        if (image) {
          img.src = image;
          img.alt = title;
        } else {
          img.remove();
        }
        document.getElementById(`${prefix}-domain`).textContent = domain;
        document.getElementById(`${prefix}-title`).textContent = title;
        document.getElementById(`${prefix}-desc`).textContent = desc;
      }

      fill('tw', data.twitter.title || data.og.title, data.twitter.description || data.og.description);
      fill('li', data.og.title, data.og.description);
      fill('sl', data.og.title, data.og.description);

      const warnings = document.getElementById('warnings');
      (data.warnings || []).forEach((warning) => {
        const li = document.createElement('li');
        li.textContent = warning;
        warnings.appendChild(li);
      });

      document.getElementById('json').textContent = JSON.stringify(data, null, 2);

      const tabs = document.getElementById('tabs');
      const cards = [...document.querySelectorAll('.card-shell.mock')];

      tabs.addEventListener('click', (event) => {
        const button = event.target.closest('.tab');
        if (!button) return;
        const platform = button.dataset.platform;
        tabs.querySelectorAll('.tab').forEach((tab) => tab.classList.toggle('active', tab === button));
        cards.forEach((card) => {
          card.classList.toggle('hidden', platform !== 'all' && card.dataset.platform !== platform);
        });
      });
    </script>
  </body>
</html>
