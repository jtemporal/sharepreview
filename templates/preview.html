<!DOCTYPE html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Share Preview</title>
    <style>
      :root,
      [data-theme="light"] {
        color-scheme: light;
        --bg: #f4f5f7;
        --panel: #ffffff;
        --text: #111827;
        --muted: #6b7280;
        --border: #e5e7eb;
        --accent: #2563eb;
        --shadow: 0 10px 30px rgba(17, 24, 39, 0.08);
        --code-bg: #0b1020;
        --code-text: #e5e7eb;
        --img-bg: #d1d5db;
      }

      [data-theme="dark"] {
        color-scheme: dark;
        --bg: #0f1115;
        --panel: #171a21;
        --text: #f3f4f6;
        --muted: #9ca3af;
        --border: #2a3140;
        --accent: #60a5fa;
        --shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
        --code-bg: #090d18;
        --code-text: #e5e7eb;
        --img-bg: #374151;
      }

      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, sans-serif;
        background: var(--bg);
        color: var(--text);
        line-height: 1.5;
        transition: background 0.2s ease, color 0.2s ease;
      }

      .wrap {
        max-width: 1100px;
        margin: 0 auto;
        padding: 32px 20px 48px;
      }

      .header-row {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 16px;
        margin-bottom: 28px;
      }

      header h1 {
        margin: 0 0 8px;
        font-size: 1.5rem;
      }

      header p {
        margin: 0;
        color: var(--muted);
        font-size: 0.95rem;
        word-break: break-all;
      }

      .theme-toggle {
        border: 1px solid var(--border);
        background: var(--panel);
        color: var(--text);
        padding: 8px 12px;
        border-radius: 999px;
        cursor: pointer;
        font-size: 0.85rem;
        white-space: nowrap;
        flex-shrink: 0;
      }

      .tabs {
        display: flex;
        gap: 8px;
        margin-bottom: 20px;
        flex-wrap: wrap;
      }

      .tab {
        border: 1px solid var(--border);
        background: var(--panel);
        color: var(--text);
        padding: 8px 14px;
        border-radius: 999px;
        cursor: pointer;
        font-size: 0.9rem;
      }

      .tab.active {
        border-color: var(--accent);
        color: var(--accent);
        font-weight: 600;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
        gap: 20px;
        justify-items: center;
      }

      .grid.focused {
        grid-template-columns: 1fr;
        max-width: 520px;
        margin: 0 auto;
      }

      .card-shell {
        width: 100%;
        max-width: 360px;
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 16px;
        box-shadow: var(--shadow);
        overflow: hidden;
      }

      .grid.focused .card-shell {
        max-width: 504px;
      }

      .grid.focused .card-shell[data-platform="slack"] {
        max-width: 440px;
      }

      .card-shell.hidden { display: none; }

      .card-shell h2 {
        margin: 0;
        padding: 14px 16px;
        font-size: 0.85rem;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        color: var(--muted);
        border-bottom: 1px solid var(--border);
      }

      .mock-inner {
        padding: 18px;
        display: flex;
        justify-content: center;
      }

      .share-card {
        width: 100%;
        max-width: 320px;
      }

      .grid.focused .share-card {
        max-width: 504px;
      }

      .grid.focused .card-shell[data-platform="slack"] .share-card {
        max-width: 400px;
      }

      .x-card, .li-card, .slack-card {
        border: 1px solid var(--border);
        border-radius: 12px;
        overflow: hidden;
        background: var(--panel);
      }

      .x-card img, .li-card img {
        display: block;
        width: 100%;
        aspect-ratio: 1.91 / 1;
        object-fit: cover;
        background: var(--img-bg);
      }

      .x-body, .li-body, .slack-body {
        padding: 10px 12px 12px;
      }

      .domain {
        color: var(--muted);
        font-size: 0.72rem;
        margin-bottom: 2px;
      }

      .title {
        font-weight: 700;
        font-size: 0.88rem;
        margin-bottom: 2px;
        line-height: 1.3;
      }

      .desc {
        color: var(--muted);
        font-size: 0.78rem;
        line-height: 1.35;
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
      }

      .slack-card {
        display: grid;
        grid-template-columns: 80px 1fr;
      }

      .slack-card img {
        display: block;
        width: 80px;
        height: 80px;
        object-fit: cover;
        background: var(--img-bg);
      }

      .meta-panel {
        margin-top: 24px;
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 16px;
        overflow: hidden;
      }

      .meta-panel summary {
        padding: 14px 18px;
        cursor: pointer;
        font-size: 0.95rem;
        font-weight: 600;
        list-style: none;
        user-select: none;
      }

      .meta-panel summary::-webkit-details-marker { display: none; }

      .meta-panel summary::after {
        content: 'Show';
        float: right;
        color: var(--muted);
        font-weight: 500;
        font-size: 0.85rem;
      }

      .meta-panel[open] summary::after { content: 'Hide'; }

      .meta-body {
        padding: 0 18px 16px;
        border-top: 1px solid var(--border);
      }

      .warnings {
        margin: 14px 0 12px;
        padding-left: 18px;
        color: #b45309;
      }

      [data-theme="dark"] .warnings { color: #fbbf24; }

      pre {
        margin: 0;
        padding: 14px;
        background: var(--code-bg);
        color: var(--code-text);
        border-radius: 12px;
        overflow: auto;
        font-size: 0.78rem;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="header-row">
        <header>
          <h1>Share Preview</h1>
          <p id="source">Source: <!--SOURCE_URL--></p>
        </header>
        <button class="theme-toggle" id="theme-toggle" type="button" aria-label="Toggle theme">
          Dark mode
        </button>
      </div>

      <div class="tabs" id="tabs">
        <button class="tab active" data-platform="all">All</button>
        <button class="tab" data-platform="twitter">X / Twitter</button>
        <button class="tab" data-platform="linkedin">LinkedIn</button>
        <button class="tab" data-platform="slack">Slack</button>
      </div>

      <div class="grid" id="grid">
        <section class="card-shell" data-platform="twitter">
          <h2>X / Twitter</h2>
          <div class="mock-inner">
            <div class="share-card">
              <div class="x-card">
                <img id="tw-image" alt="" />
                <div class="x-body">
                  <div class="domain" id="tw-domain"></div>
                  <div class="title" id="tw-title"></div>
                  <div class="desc" id="tw-desc"></div>
                </div>
              </div>
            </div>
          </div>
        </section>

        <section class="card-shell" data-platform="linkedin">
          <h2>LinkedIn</h2>
          <div class="mock-inner">
            <div class="share-card">
              <div class="li-card">
                <img id="li-image" alt="" />
                <div class="li-body">
                  <div class="domain" id="li-domain"></div>
                  <div class="title" id="li-title"></div>
                  <div class="desc" id="li-desc"></div>
                </div>
              </div>
            </div>
          </div>
        </section>

        <section class="card-shell" data-platform="slack">
          <h2>Slack</h2>
          <div class="mock-inner">
            <div class="share-card">
              <div class="slack-card">
                <img id="sl-image" alt="" />
                <div class="slack-body">
                  <div class="domain" id="sl-domain"></div>
                  <div class="title" id="sl-title"></div>
                  <div class="desc" id="sl-desc"></div>
                </div>
              </div>
            </div>
          </div>
        </section>
      </div>

      <details class="meta-panel">
        <summary>Extracted metadata</summary>
        <div class="meta-body">
          <ul class="warnings" id="warnings"></ul>
          <pre id="json"></pre>
        </div>
      </details>
    </div>

    <script id="payload" type="application/json"><!--PAYLOAD_JSON--></script>
    <script>
      const data = JSON.parse(document.getElementById('payload').textContent);
      const root = document.documentElement;
      const themeToggle = document.getElementById('theme-toggle');
      const THEME_KEY = 'sharepreview-theme';

      function applyTheme(theme) {
        root.dataset.theme = theme;
        themeToggle.textContent = theme === 'dark' ? 'Light mode' : 'Dark mode';
        localStorage.setItem(THEME_KEY, theme);
      }

      applyTheme(localStorage.getItem(THEME_KEY)
        || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light'));

      themeToggle.addEventListener('click', () => {
        applyTheme(root.dataset.theme === 'dark' ? 'light' : 'dark');
      });

      const domain = (() => {
        try { return new URL(data.og.url).hostname.replace(/^www\./, ''); }
        catch { return 'example.com'; }
      })();

      const image = data.og.image ? `/proxy?url=${encodeURIComponent(data.og.image)}` : '';

      function fill(prefix, title, desc) {
        const img = document.getElementById(`${prefix}-image`);
        if (image) {
          img.src = image;
          img.alt = title;
        } else {
          img.remove();
        }
        document.getElementById(`${prefix}-domain`).textContent = domain;
        document.getElementById(`${prefix}-title`).textContent = title;
        document.getElementById(`${prefix}-desc`).textContent = desc;
      }

      fill('tw', data.twitter.title || data.og.title, data.twitter.description || data.og.description);
      fill('li', data.og.title, data.og.description);
      fill('sl', data.og.title, data.og.description);

      const warnings = document.getElementById('warnings');
      (data.warnings || []).forEach((warning) => {
        const li = document.createElement('li');
        li.textContent = warning;
        warnings.appendChild(li);
      });
      if (!data.warnings?.length) warnings.remove();

      document.getElementById('json').textContent = JSON.stringify(data, null, 2);

      const tabs = document.getElementById('tabs');
      const grid = document.getElementById('grid');
      const cards = [...document.querySelectorAll('.card-shell')];

      tabs.addEventListener('click', (event) => {
        const button = event.target.closest('.tab');
        if (!button) return;
        const platform = button.dataset.platform;
        tabs.querySelectorAll('.tab').forEach((tab) => tab.classList.toggle('active', tab === button));
        grid.classList.toggle('focused', platform !== 'all');
        cards.forEach((card) => {
          card.classList.toggle('hidden', platform !== 'all' && card.dataset.platform !== platform);
        });
      });
    </script>
  </body>
</html>
